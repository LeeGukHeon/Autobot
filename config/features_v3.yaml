features:
  dataset_name: features_v3
  input_dataset: candles_v1
  float_dtype: float32

universe:
  quote: KRW
  mode: static_start
  top_n: 50
  lookback_days: 7
  fixed_list: []

time_range:
  start: "2026-02-24"
  end: "2026-03-05"

feature_set_v1:
  windows:
    ret: [1, 3, 6, 12]
    rv: [12, 36]
    ema: [12, 36]
    rsi: 14
    atr: 14
    vol_z: 36
  enable_factor_features: false
  factor_markets: []
  enable_liquidity_rank: false

label_v1:
  horizon_bars: 12
  thr_bps: 15
  neutral_policy: drop
  fee_bps_est: 10
  safety_bps: 5

features_v3:
  output_dataset: features_v3
  tf: 5m
  base_candles_dataset: auto
  micro_dataset: micro_v1
  high_tfs: [15m, 60m, 240m]
  high_tf_staleness_multiplier: 2.0
  one_m_required_bars: 5
  one_m_max_missing_ratio: 0.2
  sample_weight_half_life_days: 60
  min_rows_for_train: 5000
  require_micro_validate_pass: true
  validation:
    leakage_fail_on_future_ts: true
