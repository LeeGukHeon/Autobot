features:
  dataset_name: features_v2
  input_dataset: candles_v1
  float_dtype: float32

universe:
  quote: KRW
  mode: static_start
  top_n: 20
  lookback_days: 7
  fixed_list: []

time_range:
  start: "2026-03-03"
  end: "2026-03-04"

feature_set_v1:
  windows:
    ret: [1, 3, 6, 12]
    rv: [12, 36]
    ema: [12, 36]
    rsi: 14
    atr: 14
    vol_z: 36
  enable_factor_features: true
  factor_markets: ["KRW-BTC", "KRW-ETH"]
  enable_liquidity_rank: false

label_v1:
  horizon_bars: 12
  thr_bps: 15
  neutral_policy: drop
  fee_bps_est: 10
  safety_bps: 5

features_v2:
  output_dataset: features_v2
  tf: 5m
  base_candles_dataset: auto
  micro_dataset: micro_v1
  alignment_mode: auto
  use_precomputed_features_v1: false
  precomputed_features_v1_dataset: features_v1
  min_rows_for_train: 5000
  micro_filter:
    require_micro_available: true
    min_trade_events: 1
    min_trade_coverage_ms: 60000
    min_book_events: 1
    min_book_coverage_ms: 60000
  validation:
    join_match_warn: 0.98
    join_match_fail: 0.90
