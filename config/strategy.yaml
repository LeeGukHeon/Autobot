strategy:
  universe:
    quote: "KRW"
    top_n: 20
    refresh_sec: 60
    hold_sec: 120
  candidates_v1:
    enabled: true
    momentum_window_sec: 60
    min_momentum_pct: 0.2
  micro_gate:
    enabled: false
    mode: trade_only
    on_missing: warn_allow
    stale_ms: 120000
    trade:
      min_trade_events: 1
      min_trade_coverage_ms: 0
      min_trade_notional_krw: 0
    book:
      max_spread_bps: 0
      min_depth_top5_krw: 0
      min_book_events: 0
      min_book_coverage_ms: 0
    live_ws:
      enabled: false
      window_sec: 60
      orderbook_topk: 5
      orderbook_level: 0
      subscribe_format: DEFAULT
      max_markets: 30
      reconnect:
        max_per_min: 3
        backoff_base_sec: 1
        backoff_max_sec: 32
  micro_order_policy:
    enabled: true
    mode: trade_only
    on_missing: static_fallback
    cross_tick_bps_max: 10.0
    cross_escalate_after_timeouts: 2
    cross_min_prob: null
    cross_micro_stale_ms: null
    abort_if_tick_bps_gt: null
    tick_size_resolver: auto
    tiering:
      w_notional: 1.0
      w_events: 0.5
      t1: 6.0
      t2: 9.0
    tiers:
      LOW:
        timeout_ms: 120000
        replace_interval_ms: 60000
        max_replaces: 1
        price_mode: PASSIVE_MAKER
        max_chase_bps: 10
      MID:
        timeout_ms: 45000
        replace_interval_ms: 15000
        max_replaces: 3
        price_mode: JOIN
        max_chase_bps: 15
      HIGH:
        timeout_ms: 15000
        replace_interval_ms: 5000
        max_replaces: 5
        price_mode: CROSS_1T
        max_chase_bps: 20
    safety:
      min_replace_interval_ms_global: 1500
      max_replaces_per_min_per_market: 10
      forbid_post_only_with_cross: true
  model_alpha_v1:
    model_ref: champion_v4
    model_family: train_v4_crypto_cs
    feature_set: v4
    selection:
      top_pct: 0.50
      min_prob: null
      min_candidates_per_ts: 1
      registry_threshold_key: top_5pct
      use_learned_recommendations: true
    position:
      max_positions_total: 3
      cooldown_bars: 6
      entry_min_notional_buffer_bps: 25.0
      sizing_mode: prob_ramp
      size_multiplier_min: 0.5
      size_multiplier_max: 1.5
    exit:
      mode: hold
      hold_bars: 6
      use_learned_hold_bars: true
      tp_pct: 0.02
      sl_pct: 0.01
      trailing_pct: 0.0
      expected_exit_slippage_bps: null
      expected_exit_fee_bps: null
    execution:
      price_mode: JOIN
      timeout_bars: 2
      replace_max: 2
      use_learned_recommendations: true
    operational:
      enabled: true
      use_calibration_artifact: true
      calibration_artifact_path: logs/operational_overlay/latest.json
      risk_multiplier_min: 0.80
      risk_multiplier_max: 1.20
      max_positions_scale_min: 0.50
      max_positions_scale_max: 1.50
      session_overlap_boost: 0.10
      session_offpeak_penalty: 0.05
      micro_quality_block_threshold: 0.15
      micro_quality_conservative_threshold: 0.35
      micro_quality_aggressive_threshold: 0.75
      max_execution_spread_bps_for_join: 20.0
      max_execution_spread_bps_for_cross: 6.0
      min_execution_depth_krw_for_cross: 1500000.0
      snapshot_stale_ms: 15000
      conservative_timeout_scale: 1.25
      aggressive_timeout_scale: 0.75
      conservative_replace_interval_scale: 1.50
      aggressive_replace_interval_scale: 0.50
      conservative_max_replaces_scale: 0.50
      aggressive_max_replaces_bonus: 1
      conservative_max_chase_bps_scale: 0.75
      aggressive_max_chase_bps_bonus: 5
      runtime_timeout_ms_floor: 5000
      runtime_replace_interval_ms_floor: 1500
