strategy:
  universe:
    quote: "KRW"
    top_n: 20
    refresh_sec: 60
    hold_sec: 120
  candidates_v1:
    enabled: true
    momentum_window_sec: 60
    min_momentum_pct: 0.2
  micro_gate:
    enabled: false
    mode: trade_only
    on_missing: warn_allow
    stale_ms: 120000
    trade:
      min_trade_events: 1
      min_trade_coverage_ms: 0
      min_trade_notional_krw: 0
    book:
      max_spread_bps: 0
      min_depth_top5_krw: 0
      min_book_events: 0
      min_book_coverage_ms: 0
    live_ws:
      enabled: false
      window_sec: 60
      orderbook_topk: 5
      orderbook_level: 0
      subscribe_format: DEFAULT
      max_markets: 30
      reconnect:
        max_per_min: 3
        backoff_base_sec: 1
        backoff_max_sec: 32
  micro_order_policy:
    enabled: false
    mode: trade_only
    on_missing: static_fallback
    tiering:
      w_notional: 1.0
      w_events: 0.5
      t1: 6.0
      t2: 9.0
    tiers:
      LOW:
        timeout_ms: 120000
        replace_interval_ms: 60000
        max_replaces: 1
        price_mode: PASSIVE_MAKER
        max_chase_bps: 10
      MID:
        timeout_ms: 45000
        replace_interval_ms: 15000
        max_replaces: 3
        price_mode: JOIN
        max_chase_bps: 15
      HIGH:
        timeout_ms: 15000
        replace_interval_ms: 5000
        max_replaces: 5
        price_mode: CROSS_1T
        max_chase_bps: 20
    safety:
      min_replace_interval_ms_global: 1500
      max_replaces_per_min_per_market: 10
      forbid_post_only_with_cross: true
  model_alpha_v1:
    model_ref: latest_v3
    model_family: train_v3_mtf_micro
    feature_set: v3
    selection:
      top_pct: 0.05
      min_prob: 0.58
      min_candidates_per_ts: 10
    position:
      max_positions_total: 3
      cooldown_bars: 6
    exit:
      mode: hold
      hold_bars: 6
      tp_pct: 0.02
      sl_pct: 0.01
      trailing_pct: 0.0
    execution:
      price_mode: JOIN
      timeout_bars: 2
      replace_max: 2
