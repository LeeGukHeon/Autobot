backtest:
  dataset_name: "candles_v1"
  parquet_root: "data/parquet"
  tf: "1m"
  from_ts_ms: null
  to_ts_ms: null
  duration_days: null
  seed: 0

  universe:
    mode: "static_start"   # static_start | fixed_list
    quote: "KRW"
    top_n: 20

  data:
    dense_grid: false

  execution:
    order_timeout_bars: 5
    reprice_max_attempts: 1
    reprice_tick_steps: 1
    rules_ttl_sec: 86400

  strategy:
    name: "candidates_v1"   # candidates_v1 | model_alpha_v1
    model_ref: "latest_v3"
    model_family: "train_v3_mtf_micro"
    feature_set: "v3"
    model_registry_root: "models/registry"
    model_feature_dataset_root: null

  output:
    root: "data/backtest"
