features:
  dataset_name: features_v4
  input_dataset: candles_v1
  float_dtype: float32

universe:
  quote: KRW
  mode: static_start
  top_n: 50
  lookback_days: 3
  fixed_list: []

time_range:
  start: "2026-02-24"
  end: "2026-03-05"

feature_set_v1:
  windows:
    ret: [1, 3, 6, 12]
    rv: [12, 36]
    ema: [12, 36]
    rsi: 14
    atr: 14
    vol_z: 36
  enable_factor_features: false
  factor_markets: []
  enable_liquidity_rank: false

label_v1:
  horizon_bars: 12
  thr_bps: 15
  neutral_policy: drop
  fee_bps_est: 10
  safety_bps: 5

label_v2:
  horizon_bars: 12
  horizons_bars: [3, 6, 12, 24]
  primary_horizon_bars: 12
  fee_bps_est: 10
  safety_bps: 5
  top_quantile: 0.2
  bottom_quantile: 0.2
  neutral_policy: drop

features_v4:
  output_dataset: features_v4
  tf: 5m
  base_candles_dataset: auto
  micro_dataset: micro_v1
  high_tfs: [15m, 60m, 240m]
  high_tf_staleness_multiplier: 2.0
  one_m_required_bars: 5
  one_m_max_missing_ratio: 0.2
  one_m_drop_if_real_count_zero: true
  one_m_synth_weight_floor: 0.2
  one_m_synth_weight_power: 2.0
  sample_weight_half_life_days: 60
  universe_quality_enabled: true
  universe_quality_lookback_days: 3
  universe_quality_beta: 2.0
  universe_quality_q_floor: 0.2
  universe_quality_oversample_factor: 3
  min_rows_for_train: 4000
  require_micro_validate_pass: true
  validation:
    leakage_fail_on_future_ts: true
