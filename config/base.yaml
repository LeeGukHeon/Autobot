mode: backtest
timezone: Asia/Seoul
log_level: INFO

live:
  enabled: false
  bot_id: "autobot-001"
  state:
    db_path: "data/state/live_state.db"
    run_lock: true
  startup:
    reconcile: true
    unknown_open_orders_policy: "halt"
    unknown_positions_policy: "attach_strategy_risk"
    allow_cancel_external_orders: false
  sync:
    poll_interval_sec: 15
    use_private_ws: false
    use_executor_ws: false
  model:
    ref: "champion_v4"
    family: "train_v4_crypto_cs"
    registry_root: "models/registry"
  data_plane:
    ws_public:
      raw_root: "data/raw_ws/upbit/public"
      meta_dir: "data/raw_ws/upbit/_meta"
      stale_threshold_sec: 180
    micro:
      aggregate_report_path: "data/parquet/micro_v1/_meta/aggregate_report.json"
  rollout:
    mode: "shadow"
    target_unit: "autobot-live-alpha.service"
    require_test_order: true
    test_order_max_age_sec: 86400
  executor:
    backend: "direct_rest"
    host: "127.0.0.1"
    port: 50051
    timeout_sec: 5.0
    insecure: true
  orders:
    identifier_prefix: "AUTOBOT"
  default_risk:
    sl_pct: 2.0
    tp_pct: 3.0
    trailing_enabled: false
  risk:
    enabled: true
    exit_aggress_bps: 8.0
    timeout_sec: 20
    replace_max: 2
    default_trail_pct: 1.0
  small_account:
    single_slot_canary: true
    max_positions: 1
    max_open_orders_per_market: 1
  strategy:
    enabled: false
    decision_interval_sec: 1.0

universe:
  quote_currency: KRW
  top_n_by_acc_trade_price_24h: 20

storage:
  raw_dir: data/raw
  parquet_dir: data/parquet
  features_dir: data/features
  backtest_dir: data/backtest
  paper_dir: data/paper

data:
  raw_dir: data/raw
  parquet_root: data/parquet
  dataset_name: candles_v1
  file_pattern: upbit_*_full.csv
  default_compression: zstd
  ingest_workers: 1
  mode: skip_unchanged
  allow_sort_on_non_monotonic: true
  allow_dedupe_on_duplicate_ts: true
  quote_volume_policy: estimate_if_missing
  qa:
    gap_severity: info
    quote_est_severity: info
    ohlc_violation_policy: drop_row_and_warn

  ingest:
    engine: duckdb
    mode: skip_unchanged
    workers: 1
    compression: zstd
    allow_sort_on_non_monotonic: true
    allow_dedupe_on_duplicate_ts: true
    quote_volume_policy: estimate_if_missing

    duckdb:
      temp_directory: D:/MyApps/Autobot/data/cache/duckdb_tmp
      memory_limit: 6GB
      threads: 2
      fail_if_temp_not_set: true
